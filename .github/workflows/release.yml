name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o tagit ./cmd/tagit
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o tagitd ./cmd/tagitd

      - name: Package
        run: |
          ARCHIVE="tagit_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar -czf "$ARCHIVE" tagit tagitd
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: tagit_${{ matrix.goos }}_${{ matrix.goarch }}
          path: |
            tagit_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
            tagit_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz.sha256
          retention-days: 1

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums file
        run: cat dist/*.sha256 > dist/checksums.txt

      - name: Extract changelog
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          if [ -f CHANGELOG.md ]; then
            # Extract section between this tag and the previous one
            awk "/^## \[?${TAG#v}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md > release_notes.md
          fi
          if [ ! -s release_notes.md ]; then
            echo "Release ${TAG}" > release_notes.md
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "TagIt ${{ github.ref_name }}" \
            --notes-file release_notes.md \
            dist/*.tar.gz \
            dist/*.sha256 \
            dist/checksums.txt
